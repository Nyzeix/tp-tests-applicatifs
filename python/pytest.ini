[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unitaire: tests unitaires (une seule fonction isolee)
    integration: tests d'integration (plusieurs modules ensemble)
    fonctionnel: tests fonctionnels (scenario metier)
    e2e: tests end-to-end (parcours utilisateur complet)
    regression: tests de regression (blindage anti-bug)
    cas_limites: tests des cas limites
    invalides: tests des entrees invalides
